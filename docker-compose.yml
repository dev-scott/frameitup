version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: frameitup-postgres
    environment:
      POSTGRES_USER: frameitup
      POSTGRES_PASSWORD: frameitup_dev
      POSTGRES_DB: frameitup
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U frameitup']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    container_name: frameitup-redis
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
